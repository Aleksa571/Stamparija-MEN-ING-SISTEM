spring.application.name=stamparija
server.port=8080

# Default profil je 'dev' (H2 in-memory baza). Za MySQL pokrenuti sa -Dspring.profiles.active=prod
spring.profiles.active=dev

# CORS - frontend na 5173 (Vite default)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# JWT konfiguracija
app.jwt.secret=ZavrsniIspitISA_MEN_ING_SISTEM_DOO_Smederevo_JWT_Secret_Kljuc_Mora_Biti_Dovoljno_Dug_Za_HS256_Algoritam_2026
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# Upload putanja za slike proizvoda
app.upload.dir=uploads

# Logovanje
logging.level.org.springframework.security=INFO
logging.level.rs.meningsistem.stamparija=DEBUG
