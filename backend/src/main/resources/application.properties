spring.application.name=stamparija
server.port=8080

# Default profil je 'prod' (MySQL preko phpMyAdmin). Za H2 in-memory dev bazu pokrenuti sa -Dspring-boot.run.profiles=dev
spring.profiles.active=prod

# CORS - frontend na 5173 (Vite default)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# JWT konfiguracija (asistentov stil naming-a: security.jwt.*)
security.jwt.secret-key=ZavrsniIspitISA_MEN_ING_SISTEM_DOO_Smederevo_JWT_Secret_Kljuc_Mora_Biti_Dovoljno_Dug_Za_HS256_Algoritam_2026
security.jwt.expiration-time=900000
security.jwt.refresh-expiration-time=604800000

# Upload putanja za slike proizvoda
app.upload.dir=uploads

# Logovanje
logging.level.org.springframework.security=INFO
logging.level.rs.meningsistem.stamparija=DEBUG
