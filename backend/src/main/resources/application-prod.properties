# =====================================================================
#  PROD profil - MySQL preko XAMPP/WAMP (phpMyAdmin)
#
#  Pre prvog pokretanja:
#    1. Pokrenuti XAMPP (Apache + MySQL)
#    2. Otvoriti phpMyAdmin (http://localhost/phpmyadmin)
#    3. Izvrsiti SQL skriptu iz database/stamparija_db.sql
# =====================================================================

spring.datasource.url=jdbc:mysql://localhost:3306/stamparija_db?useSSL=false&serverTimezone=Europe/Belgrade&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# 'update' - Hibernate nece brisati postojece tabele, samo eventualno dodati nedostajuce kolone.
# Tako ako pokrenete bekend pre nego sto ste izvrsili SQL skriptu, Hibernate ce sam kreirati strukturu
# i DataSeeder ce ubaciti pocetne podatke.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# DataSeeder ce preskociti seed jer ce SQL skripta vec popuniti tabele.
